<title>Bilandi's Cafe — Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --cr:#7A1515;--cr2:#9B1C1C;
  --gold:#C49A2A;--gold2:#E0B838;
  --cream:#FDF6E9;--cream2:#F5EDD8;--cream3:#EDE0C4;
  --white:#fff;--dark:#1A0D00;--muted:#7A6040;--muted2:#9A7A50;
  --green:#2E7D32;
  --border:rgba(122,21,21,0.13);
  --cs:0 2px 12px rgba(122,21,21,0.09);
  --csh:0 6px 24px rgba(122,21,21,0.17);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--cream);font-family:'Nunito',sans-serif;color:var(--dark);overflow-x:hidden;min-height:100vh}

/* NAV */
.nav{background:var(--cr);position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.nav-inner{display:flex;align-items:center;gap:10px;padding:0 14px;height:54px}
.logo{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:900;color:var(--cream);letter-spacing:.04em;line-height:1;white-space:nowrap}
.logo small{display:block;font-family:'Nunito',sans-serif;font-size:9px;font-weight:700;color:rgba(253,246,233,.5);letter-spacing:.18em;text-transform:uppercase;margin-top:1px}
.nav-search{flex:1;display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.18);border-radius:24px;padding:8px 14px}
.nav-search svg{color:rgba(253,246,233,.45);flex-shrink:0}
.nav-search input{background:none;border:none;outline:none;color:var(--cream);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;width:100%}
.nav-search input::placeholder{color:rgba(253,246,233,.4)}
.nav-link{color:var(--gold2);font-size:11px;font-weight:800;text-decoration:none;white-space:nowrap;display:none}
@media(min-width:480px){.nav-link{display:block}}

/* GOLD LINE */
.gline{height:3px;background:linear-gradient(90deg,var(--cr) 0%,var(--gold) 25%,var(--gold2) 50%,var(--gold) 75%,var(--cr) 100%)}

/* HERO */
.hero{background:linear-gradient(135deg,var(--cr) 0%,#5A0D0D 60%,#3A0808 100%);padding:24px 16px 28px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 100% at 50% 0%,rgba(196,154,42,.16) 0%,transparent 65%)}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,10vw,3.2rem);font-weight:900;color:var(--cream);letter-spacing:.04em;position:relative}
.hero h1 em{color:var(--gold2);font-style:italic}
.hero p{font-size:12px;color:rgba(253,246,233,.55);margin-top:5px;font-weight:700;letter-spacing:.06em;position:relative}

/* CAT CIRCLES */
.cats{background:var(--white);border-bottom:2px solid var(--cream2);padding:16px 0 18px}
.cats-title{font-size:15px;font-weight:900;padding:0 14px;margin-bottom:14px;color:var(--dark)}
.cats-row{display:flex;gap:2px;overflow-x:auto;padding:0 12px;scrollbar-width:none}
.cats-row::-webkit-scrollbar{display:none}
.cat-btn{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:7px;padding:4px 8px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .15s;border:none;background:none}
.cat-btn:hover{transform:translateY(-2px)}
.cat-btn:active{transform:scale(.93)}
.cat-circle{width:68px;height:68px;border-radius:50%;background:var(--cream2);border:2.5px solid transparent;display:flex;align-items:center;justify-content:center;font-size:2.1rem;line-height:1;transition:border-color .2s,box-shadow .2s,background .2s;box-shadow:0 2px 10px rgba(122,21,21,.1)}
.cat-btn.active .cat-circle,.cat-btn:hover .cat-circle{border-color:var(--cr);box-shadow:0 3px 14px rgba(122,21,21,.25);background:rgba(122,21,21,.05)}
.cat-lbl{font-size:10px;font-weight:800;color:var(--dark);text-align:center;line-height:1.2;max-width:72px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cat-btn.active .cat-lbl{color:var(--cr)}

/* MAIN */
.main{max-width:900px;margin:0 auto;padding:22px 12px 80px}

/* SECTION */
.sec{margin-bottom:40px;animation:fadeUp .35s ease both}
.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--border);position:relative}
.sec-head::after{content:'';position:absolute;bottom:-2px;left:0;width:50px;height:2px;background:var(--cr)}
.sec-ico{font-size:1.3rem}
.sec-name{font-family:'Playfair Display',serif;font-size:clamp(1.15rem,4vw,1.45rem);font-weight:700;color:var(--cr);line-height:1}
.sec-count{margin-left:auto;font-size:10px;font-weight:800;color:var(--muted2);background:rgba(122,21,21,.07);border:1px solid var(--border);padding:3px 9px;border-radius:100px;white-space:nowrap}

/* ITEMS LIST — always single column on mobile */
.items-list{display:flex;flex-direction:column;gap:9px}
@media(min-width:580px){
  .items-list{display:grid;grid-template-columns:1fr 1fr;gap:10px}
}

/* CARD */
.card{background:var(--white);border:1px solid rgba(122,21,21,.09);border-radius:14px;padding:14px 15px;display:flex;align-items:center;gap:11px;box-shadow:var(--cs);transition:box-shadow .2s,border-color .2s,transform .15s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--cr) 0%,var(--gold) 100%);opacity:0;transition:opacity .2s}
.card:hover{box-shadow:var(--csh);border-color:rgba(122,21,21,.22);transform:translateY(-1px)}
.card:hover::before{opacity:1}
.card:active{transform:scale(.99)}
.card.special{border-color:rgba(196,154,42,.38);background:linear-gradient(135deg,#fff 60%,#fffbee 100%)}
.card.special::before{opacity:1;background:linear-gradient(180deg,var(--gold) 0%,var(--cr) 100%)}
.card.highlight{border:2px solid var(--gold);background:linear-gradient(135deg,#fffef5 0%,#fff9e0 100%);box-shadow:0 0 18px rgba(196,154,42,.22),var(--cs);animation:shine 2.2s ease-in-out infinite}
@keyframes shine{0%,100%{box-shadow:0 0 18px rgba(196,154,42,.22),var(--cs)}50%{box-shadow:0 0 30px rgba(196,154,42,.38),var(--csh)}}

.card-left{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}
.card-namerow{display:flex;align-items:flex-start;gap:8px}
.veg{flex-shrink:0;width:16px;height:16px;border:1.5px solid var(--green);border-radius:3px;display:flex;align-items:center;justify-content:center;margin-top:2px}
.veg::after{content:'';width:8px;height:8px;background:var(--green);border-radius:50%}
.card-name{font-family:'Playfair Display',serif;font-size:.97rem;font-weight:700;color:var(--dark);line-height:1.3}
.card-name em{color:var(--cr);font-style:italic}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;padding:2px 9px;border-radius:100px;width:fit-content}
.badge-gold{background:rgba(196,154,42,.12);border:1px solid rgba(196,154,42,.38);color:var(--gold)}
.badge-red{background:rgba(122,21,21,.09);border:1px solid rgba(122,21,21,.22);color:var(--cr)}

.card-right{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.price-single{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--cr)}
.price-sizes{display:flex;gap:5px}
.chip{display:flex;flex-direction:column;align-items:center;background:rgba(122,21,21,.06);border:1px solid var(--border);border-radius:8px;padding:4px 8px;min-width:46px;transition:background .15s}
.card:hover .chip{background:rgba(122,21,21,.11)}
.chip-lbl{font-size:9px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--muted2)}
.chip-val{font-size:.88rem;font-weight:800;color:var(--cr)}

/* COMING SOON */
.coming{display:flex;align-items:center;justify-content:center;gap:10px;padding:30px 16px;border:1.5px dashed rgba(122,21,21,.2);border-radius:14px;background:rgba(255,255,255,.5);font-size:1rem;color:var(--muted2);font-weight:700;font-style:italic}

/* NO RESULTS */
.nores{text-align:center;padding:60px 16px;font-size:1rem;color:var(--muted2);font-weight:700}
.nores strong{color:var(--cr)}

/* FOOTER */
footer{background:var(--cr);text-align:center;padding:24px 16px;border-top:3px solid var(--gold);color:rgba(253,246,233,.55);font-size:12px;font-weight:600}
footer b{display:block;font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--gold2);letter-spacing:.2em;margin-bottom:6px}
footer a{color:var(--gold2);text-decoration:none}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:380px){
  .cat-circle{width:60px;height:60px;font-size:1.85rem}
  .chip{min-width:40px;padding:3px 5px}
  .chip-val{font-size:.82rem}
  .card-name{font-size:.9rem}
  .price-single{font-size:1.1rem}
}
</style>
</head>

MENU.forEach(section => {
  section.items.forEach(item => {

    if (item.price && item.price % 10 === 9) {
      item.price += 1;
    }

    if (item.prices) {
      item.prices = item.prices.map(p =>
        p % 10 === 9 ? p + 1 : p
      );
    }

    if (item.halfFull) {
      item.halfFull = item.halfFull.map(p =>
        p % 10 === 9 ? p + 1 : p
      );

const catsEl=document.getElementById('cats'),mainEl=document.getElementById('main');

// Build circles
const allBtn=document.createElement('button');
allBtn.className='cat-btn active';allBtn.dataset.cat='all';
allBtn.innerHTML='<div class="cat-circle">🏠</div><div class="cat-lbl">All</div>';
catsEl.appendChild(allBtn);
MENU.forEach(s=>{
  const b=document.createElement('button');
  b.className='cat-btn';b.dataset.cat=s.cat;
  b.innerHTML=`<div class="cat-circle">${s.icon}</div><div class="cat-lbl">${s.cat}</div>`;
  catsEl.appendChild(b);
});

catsEl.addEventListener('click',e=>{
  const b=e.target.closest('.cat-btn');if(!b)return;
  document.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  document.getElementById('si').value='';
  render(b.dataset.cat,'');
  if(b.dataset.cat!=='all'){
    setTimeout(()=>{
      const el=document.getElementById('s-'+b.dataset.cat.replace(/\s+/g,'_'));
      if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
    },60);
  }
});

function x(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#x27;')}

function render(filter,search){
  mainEl.innerHTML='';
  const sq=(search||'').toLowerCase().trim();

  MENU.forEach((sec,si)=>{
    if(filter!=='all'&&filter!==sec.cat)return;

    if(sec.comingSoon){
      if(sq)return;
      const s=document.createElement('section');
      s.className='sec';s.id='s-'+sec.cat.replace(/\s+/g,'_');
      s.style.animationDelay=si*.03+'s';
      s.innerHTML=`<div class="sec-head"><span class="sec-ico">${sec.icon}</span><h2 class="sec-name">${x(sec.cat)}</h2></div><div class="coming">✨ Something delicious coming soon…</div>`;
      mainEl.appendChild(s);return;
    }

    const items=sq?sec.items.filter(it=>it.name.toLowerCase().includes(sq)):sec.items;
    if(!items.length)return;

    const s=document.createElement('section');
    s.className='sec';s.id='s-'+sec.cat.replace(/\s+/g,'_');
    s.style.animationDelay=si*.03+'s';
    s.innerHTML=`<div class="sec-head"><span class="sec-ico">${sec.icon}</span><h2 class="sec-name">${x(sec.cat)}</h2><span class="sec-count">${items.length} item${items.length>1?'s':''}</span></div>`;

    const list=document.createElement('div');list.className='items-list';

    items.forEach(it=>{
      const c=document.createElement('div');
      c.className='card'+(it.special?' special':'')+(it.highlight?' highlight':'');

      let nameH=x(it.name).replace("Bilandi&#x27;s Special","<em>Bilandi's Special</em>");

      // Price HTML
      let priceH='';
      if(it.prices){
        priceH=`<div class="price-sizes">${it.prices.map((p,i)=>`<div class="chip"><span class="chip-lbl">${SZ[i]}</span><span class="chip-val">₹${p}</span></div>`).join('')}</div>`;
      } else if(it.halfFull){
        priceH=`<div class="price-sizes"><div class="chip"><span class="chip-lbl">Half</span><span class="chip-val">₹${it.halfFull[0]}</span></div><div class="chip"><span class="chip-lbl">Full</span><span class="chip-val">₹${it.halfFull[1]}</span></div></div>`;
      } else {
        priceH=`<div class="price-single">₹${it.price}</div>`;
      }

      let badgeH='';
      if(it.highlight) badgeH='<span class="badge badge-red">🌟 Must Try</span>';
      else if(it.special) badgeH='<span class="badge badge-gold">⭐ Chef\'s Pick</span>';

      c.innerHTML=`
        <div class="card-left">
          <div class="card-namerow"><div class="veg"></div><div class="card-name">${nameH}</div></div>
          ${badgeH}
        </div>
        <div class="card-right">${priceH}</div>`;
      list.appendChild(c);
    });

    s.appendChild(list);mainEl.appendChild(s);
  });

  if(!mainEl.children.length){
    mainEl.innerHTML=`<div class="nores">No dishes found for "<strong>${x(search)}</strong>"<br><br>Try a different keyword 🙏</div>`;
  }
}

document.getElementById('si').addEventListener('input',e=>{
  document.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('active'));
  document.querySelector('.cat-btn[data-cat="all"]').classList.add('active');
  render('all',e.target.value);
});

render('all','');
</script>
</body>
</html>
